<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Undangan Joylin</title>
  <style>
    :root {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #fff0f2 0%, #f7d7dc 35%, #f2c1c7 100%);
      color: #582146;
    }

    *, *::before, *::after { box-sizing: inherit; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .phone {
      width: min(420px, 100%);
      border-radius: 48px;
      background: linear-gradient(180deg, #fce7eb 0%, #f4c1cb 50%, #ffc8d4 100%);
      border: 3px solid rgba(255,255,255,0.75);
      box-shadow: 0 28px 70px rgba(88, 33, 70, 0.18);
      overflow: hidden;
      position: relative;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 2px solid rgba(255,255,255,0.55);
      pointer-events: none;
    }

    .notch {
      width: 110px;
      height: 8px;
      background: rgba(88, 33, 70, 0.16);
      border-radius: 999px;
      margin: 10px auto 0;
      position: relative;
      z-index: 1;
    }

    .screen {
      position: relative;
      background: transparent;
      border-radius: 34px;
      margin: 8px;
      box-shadow: inset 0 0 0 1px rgba(88,33,70,0.08), 0 20px 40px rgba(88,33,70,0.08);
      overflow: hidden;
    }

    .screen::before {
      content: "";
      position: absolute;
      top: 16px;
      right: -40px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(255, 199, 219, 0.45);
      filter: blur(16px);
    }

    .screen img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .back-link {
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(220px, 80%);
      margin: 16px auto 24px;
      padding: 12px 0;
      background: rgba(255,255,255,0.95);
      color: #8f2356;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.08em;
      box-shadow: 0 18px 28px rgba(79, 20, 59, 0.16);
      z-index: 2;
    }

    @media (max-width: 420px) {
      .screen {
        min-height: 700px;
      }

      .notch {
        width: 90px;
      }

      .info {
        bottom: 18px;
      }

      .info .title {
        font-size: 13px;
      }

      .info .meta {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen">
      <img src="invit.jpeg" alt="Undangan Joylin" />
      <a class="back-link" href="index.html">Kembali</a>
    </div>
  </div>
</body>
</html>
