<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halo Joylin</title>
  <style>
    :root {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #fff0f2 0%, #ffd8eb 45%, #ffb8d6 100%);
      color: #582146;
    }

    *, *::before, *::after { box-sizing: inherit; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .phone {
      width: min(420px, 100%);
      border-radius: 48px;
      background: linear-gradient(180deg, #fce7eb 0%, #f4c1cb 50%, #ffc8d4 100%);
      border: 3px solid rgba(255,255,255,0.75);
      box-shadow: 0 28px 70px rgba(88, 33, 70, 0.18);
      overflow: hidden;
      position: relative;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 2px solid rgba(255,255,255,0.55);
      pointer-events: none;
    }

    .notch {
      width: 110px;
      height: 8px;
      background: rgba(88, 33, 70, 0.16);
      border-radius: 999px;
      margin: 16px auto 0;
      position: relative;
      z-index: 1;
    }

    .screen {
      position: relative;
      background: #fff;
      border-radius: 34px;
      margin: 12px;
      min-height: 760px;
      box-shadow: inset 0 0 0 1px rgba(88,33,70,0.08), 0 20px 40px rgba(88,33,70,0.08);
      overflow: hidden;
    }

    .screen::before {
      content: "";
      position: absolute;
      top: 16px;
      right: -40px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(255, 199, 219, 0.45);
      filter: blur(16px);
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 24px 20px 32px;
      display: grid;
      gap: 18px;
      text-align: center;
    }

    .top-text {
      font-size: clamp(22px, 6vw, 30px);
      font-weight: 700;
      margin: 0;
      animation: pulseText 2.5s ease-in-out infinite;
    }

    .image-wrap {
      border-radius: 28px;
      overflow: hidden;
      border: 2px solid rgba(88,33,70,0.12);
      background: #fff;
      box-shadow: 0 18px 30px rgba(88,33,70,0.08);
    }

    .image-wrap img {
      width: 100%;
      display: block;
      object-fit: cover;
      height: 360px;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #c63d7c 0%, #ff8db2 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      min-width: 120px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 26px rgba(198, 61, 124, 0.25);
    }

    .hint {
      margin: 0;
      color: #6f2a55;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    @keyframes pulseText {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.85; transform: scale(1.02); }
    }

    @media (max-width: 420px) {
      .screen {
        min-height: 700px;
      }

      .image-wrap img {
        height: 300px;
      }

      .content {
        padding: 20px 16px 28px;
      }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen">
      <div class="content">
        <p class="top-text">halo joylin</p>
        <div class="image-wrap">
          <img src="https://images.unsplash.com/photo-1513070432395-9bc8f0500f4b?auto=format&fit=crop&w=900&q=80" alt="Surat undangan" />
        </div>
        <div class="btn-group">
          <a class="btn" href="undangan.html">Klik</a>
        </div>
        <p class="hint">untuk lihat surat</p>
      </div>
    </div>
  </div>
</body>
</html>
